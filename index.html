<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국가 탐색기</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="./css/global.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  </head>
  <body class="bg-gray-50 min-h-screen pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <h1 class="text-3xl font-bold text-gray-800">국가 탐색기</h1>
        </div>

        <!-- 세계지도 보기 버튼 -->
        <button
          onclick="showWorldMap()"
          class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2 transition"
        >
          세계지도
        </button>
      </div>

      <!-- 대륙 필터 -->
      <div
        class="flex flex-wrap gap-2 mb-8 overflow-x-auto pb-3"
        id="continentFilters"
      >
        <button
          onclick="filterByContinent('all')"
          class="continent-btn active px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          전체
        </button>
        <button
          onclick="filterByContinent('Asia')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          아시아
        </button>
        <button
          onclick="filterByContinent('Europe')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          유럽
        </button>
        <button
          onclick="filterByContinent('Africa')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          아프리카
        </button>
        <button
          onclick="filterByContinent('Americas')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          아메리카
        </button>
        <button
          onclick="filterByContinent('Oceania')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          오세아니아
        </button>
        <button
          onclick="filterByContinent('Antarctic')"
          class="continent-btn px-6 py-3 rounded-2xl text-sm border border-gray-300 whitespace-nowrap"
        >
          남극
        </button>
      </div>

      <input
        type="text"
        id="search"
        placeholder="국가 이름을 검색하세요..."
        class="w-full px-6 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 mb-8"
      />

      <div id="favoritesSection" class="mb-8">
        <h3 class="flex items-center gap-2 text-lg font-semibold mb-4">
          즐겨찾기
        </h3>
        <div
          id="favoritesList"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
        ></div>
      </div>
      <h3 class="flex items-center gap-2 text-lg font-semibold mb-4">
        국가목록
      </h3>
      <div id="loading" class="hidden flex justify-center items-center py-20">
        <div
          class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-500"
        ></div>
        <span class="ml-4 text-lg text-gray-600"
          >국가 정보를 불러오는 중...</span
        >
      </div>

      <div
        id="countryList"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></div>
    </div>

    <!-- 모달 -->
    <div
      id="detailModal"
      class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4"
    >
      <div
        class="relative bg-white rounded-3xl shadow-2xl size-full max-w-5xl max-h-[80vh] md:max-h-[95vh] overflow-y-auto scroll-hidden"
      >
        <div
          class="sticky top-0 z-[1200] bg-white w-full max-w-5xl flex justify-between items-center border-b px-6 py-5"
        >
          <div class="flex items-center gap-2">
            <button
              id="favoriteBtn"
              class="text-2xl transition-colors hover:scale-110"
            ></button>
            <h2
              id="modalCountryName"
              class="text-2xl font-bold text-gray-800"
            ></h2>
          </div>
          <button
            onclick="closeModal()"
            class="text-3xl leading-none text-gray-400 hover:text-gray-600"
          >
            ×
          </button>
        </div>

        <div class="p-6">
          <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1 lg:w-4/12">
              <img
                id="modalFlag"
                class="w-full h-64 object-cover rounded-2xl shadow-md mb-6"
                alt="국기"
              />
              <div class="grid grid-cols-2 gap-y-6 text-sm">
                <div>
                  <p class="text-gray-500">수도</p>
                  <p
                    id="modalCapital"
                    class="font-semibold text-2xl text-gray-800"
                  ></p>
                </div>
                <div>
                  <p class="text-gray-500">지역</p>
                  <p
                    id="modalRegion"
                    class="font-semibold text-2xl text-gray-800"
                  ></p>
                </div>
                <div>
                  <p class="text-gray-500">인구</p>
                  <p
                    id="modalPopulation"
                    class="font-semibold text-2xl text-gray-800"
                  ></p>
                </div>
                <div>
                  <p class="text-gray-500">주요 언어</p>
                  <p
                    id="modalLanguages"
                    class="font-semibold text-2xl text-gray-800"
                  ></p>
                </div>
              </div>
            </div>

            <div class="flex-1 lg:w-8/12">
              <div
                id="modalMap"
                class="w-full rounded-2xl overflow-hidden border border-gray-200"
              ></div>
            </div>
          </div>

          <div class="mt-6 pt-6 border-t border-gray-200">
            <h4
              class="text-sm font-medium text-gray-500 mb-3 flex items-center gap-1"
            >
              화폐 정보 & 환율 (KRW 기준)
            </h4>
            <div id="modalCurrencyInfo" class="space-y-2 text-gray-800"></div>
          </div>

          <!-- 환율 계산기 -->
          <div class="pt-6 border-t border-gray-200">
            <h4 class="text-sm font-medium text-gray-500 mb-3">환율 계산기</h4>
            <div
              id="exchangeCalculator"
              class="bg-gray-50 rounded-2xl p-5"
            ></div>
          </div>

          <div class="px-6 py-4 flex justify-center md:hidden">
            <button
              onclick="closeModal()"
              class="px-10 py-3 bg-gray-100 hover:bg-gray-200 rounded-2xl font-medium transition"
            >
              닫기
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 세계지도 전용 큰 모달 -->
    <div
      id="worldMapModal"
      class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[1100]"
    >
      <!-- 헤더 -->
      <button
        onclick="closeWorldMap()"
        class="absolute top-6 right-6 text-4xl text-gray-400 hover:text-gray-600 z-[1200]"
      >
        ×
      </button>

      <!-- 지도 영역 -->
      <div
        class="world-map-container w-full max-w-[100vw] max-h-[100vh] overflow-hidden"
      >
        <div id="worldMap" class="w-full h-full overflow-hidden"></div>
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/exchange.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
